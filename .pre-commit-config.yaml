# Runs Ruff (lint + format) on Python files before each commit.
# Install once with:  pre-commit install
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      # Linter — auto-fixes what it can.
      - id: ruff-check
        args: [--fix]
        files: ^backend/
      # Formatter.
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
